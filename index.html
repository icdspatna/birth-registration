<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आंगनवाड़ी केंद्र ट्रैकर</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 15px; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1e88e5; margin-bottom: 25px; font-weight: 600; }
        
        .search-box { width: 100%; padding: 14px 20px; margin-bottom: 20px; border: 2px solid #e0e0e0; border-radius: 30px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .search-box:focus { border-color: #1e88e5; box-shadow: 0 0 8px rgba(30,136,229,0.2); }
        
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { background-color: #1e88e5; color: white; padding: 15px; text-align: left; }
        td { padding: 14px 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
        tr:hover { background-color: #faffff; }
        
        .btn-group { display: flex; flex-direction: column; gap: 6px; }
        .btn { border: none; padding: 8px 12px; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: 500; transition: 0.2s; text-align: center; text-decoration: none; }
        .btn-view { background: #43a047; color: white; }
        .btn-view:hover { background: #388e3c; }
        .btn-nav { background: #1976d2; color: white; }
        .btn-nav:hover { background: #1565c0; }
        
        #mapSection { display: none; margin-top: 30px; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; }
        .map-header { background: #333; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 450px; border: none; }
        .close-btn { background: #e53935; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 आंगनवाड़ी केंद्र ट्रैकर</h2>
    
    <input type="text" id="searchInput" class="search-box" placeholder="पंचायत या केंद्र का नाम खोजें..." onkeyup="filterTable()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>पंचायत</th>
                    <th>केंद्र विवरण</th>
                    <th>सेविका/सहायिका</th>
                    <th>संपर्क</th>
                    <th>रास्ता देखें</th>
                </tr>
            </thead>
            <tbody id="centerBody"></tbody>
        </table>
    </div>

    <!-- Map Preview Box -->
    <div id="mapSection">
        <div class="map-header">
            <span id="centerTitle">केंद्र का स्थान</span>
            <button class="close-btn" onclick="hideMap()">बंद करें ×</button>
        </div>
        <iframe id="mapFrame" src=""></iframe>
    </div>
</div>

<script>
    // केंद्र डेटा लिस्ट (Data List)
    const centers = [
        { panchayat: "रामपुर", name: "केंद्र 01", code: "AWC-101", sevika: "सुनीता देवी", sahayika: "रीता", mobile: "9876543210", lat: 25.5941, lng: 85.1376 },
        { panchayat: "लक्ष्मणपुर", name: "केंद्र 05", code: "AWC-105", sevika: "मीना सिंह", sahayika: "गीता", mobile: "9988776655", lat: 25.6126, lng: 85.1583 },
        { panchayat: "बिहटा", name: "केंद्र 12", code: "AWC-112", sevika: "अंजली कुमारी", sahayika: "पूनम", mobile: "8877665544", lat: 25.5615, lng: 84.8715 }
    ];

    function renderTable() {
        const body = document.getElementById('centerBody');
        body.innerHTML = centers.map(c => `
            <tr>
                <td><b>${c.panchayat}</b></td>
                <td>${c.name}<br><small style="color:#666">कोड: ${c.code}</small></td>
                <td>S: ${c.sevika}<br><small>H: ${c.sahayika}</small></td>
                <td><a href="tel:${c.mobile}" style="color:#1e88e5; text-decoration:none">${c.mobile}</a></td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-view" onclick="showOnPage(${c.lat}, ${c.lng}, '${c.name}')">यहाँ देखें</button>
                        <a class="btn btn-nav" href="https://google.com{c.lat},${c.lng}" target="_blank">रास्ता नेविगेट</a>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // १. इसी पेज पर नक्शा लोड करने के लिए (Corrected Embed URL)
    function showOnPage(lat, lng, name) {
        const mapSection = document.getElementById('mapSection');
        const frame = document.getElementById('mapFrame');
        document.getElementById('centerTitle').innerText = "केंद्र का स्थान: " + name;
        
        // Fixed URL syntax: Added "/" after google.com
        const embedUrl = "https://google.com" + lat + "," + lng + "&hl=hi&z=15&output=embed";
        
        frame.src = embedUrl;
        mapSection.style.display = 'block';
        mapSection.scrollIntoView({ behavior: 'smooth' });
    }

    function hideMap() {
        document.getElementById('mapSection').style.display = 'none';
        document.getElementById('mapFrame').src = "";
    }

    // २. सर्च फीचर
    function filterTable() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#centerBody tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? "" : "none";
        });
    }

    window.onload = renderTable;
</script>

</body>
</html>
