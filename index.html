<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आंगनवाड़ी केंद्र ट्रैकर</title>
    
    <style>
        /* CSS Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #dfe4ea; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .table-wrapper { overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: #3498db; color: white; padding: 15px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #ddd; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; transition: 0.3s; }
        
        .map-btn { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .map-btn:hover { background-color: #1e8449; transform: translateY(-2px); }
        
        .badge { background: #ecf0f1; padding: 4px 8px; border-radius: 4px; color: #7f8c8d; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📍 आंगनवाड़ी केंद्र मार्गदर्शिका</h2>
        
        <input type="text" id="searchInput" class="search-box" placeholder="पंचायत, केंद्र या सेविका का नाम खोजें..." onkeyup="filterTable()">

        <div class="table-wrapper">
            <table id="centerTable">
                <thead>
                    <tr>
                        <th>पंचायत</th>
                        <th>केंद्र का नाम</th>
                        <th>कोड</th>
                        <th>सेविका का नाम</th>
                        <th>सहायिका</th>
                        <th>मोबाइल</th>
                        <th>मार्ग (Map)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // १. डेटा सूची (यहाँ आप और भी केंद्र जोड़ सकते हैं)
        const centers = [
            { 
                panchayat: "रामपुर", 
                name: "आंगनवाड़ी केंद्र 01", 
                code: "AWC-101", 
                sevika: "सुनीता देवी", 
                sahayika: "रीता कुमारी", 
                mobile: "9876543210", 
                lat: 25.5941, 
                lng: 85.1376 
            },
            { 
                panchayat: "लक्ष्मणपुर", 
                name: "आंगनवाड़ी केंद्र 05", 
                code: "AWC-105", 
                sevika: "मीना सिंह", 
                sahayika: "गीता देवी", 
                mobile: "9988776655", 
                lat: 25.6126, 
                lng: 85.1583 
            },
            { 
                panchayat: "बिहटा", 
                name: "आंगनवाड़ी केंद्र 12", 
                code: "AWC-112", 
                sevika: "अंजली कुमारी", 
                sahayika: "पूनम देवी", 
                mobile: "8877665544", 
                lat: 25.5615, 
                lng: 84.8715 
            }
        ];

        // २. टेबल में डेटा भरने का फंक्शन
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = centers.map(center => `
                <tr>
                    <td><b>${center.panchayat}</b></td>
                    <td>${center.name}</td>
                    <td><span class="badge">${center.code}</span></td>
                    <td>${center.sevika}</td>
                    <td>${center.sahayika}</td>
                    <td><a href="tel:${center.mobile}" style="color: #2980b9; text-decoration: none;">${center.mobile}</a></td>
                    <td>
                        <button class="map-btn" onclick="openDirections(${center.lat}, ${center.lng})">
                            रास्ता देखें
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ३. गूगल मैप्स पर रास्ता दिखाने का फंक्शन
        function openDirections(lat, lng) {
            // यह यूजर की वर्तमान जगह से गंतव्य तक का गूगल मैप नेविगेशन खोलता है
            const googleMapsUrl = `https://google.com{lat},${lng}&travelmode=driving`;
            window.open(googleMapsUrl, '_blank');
        }

        // ४. सर्च/फिल्टर फंक्शन
        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.getElementById("tableBody").getElementsByTagName("tr");

            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].textContent.toLowerCase();
                rows[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        // पेज लोड होते ही टेबल दिखाएं
        window.onload = renderTable;
    </script>

</body>
</html>
