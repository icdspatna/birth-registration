<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWC Tracker - Final Fix</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 15px; margin: 0; }
        .box { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        
        /* Buttons Style */
        .btn { display: inline-block; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-size: 13px; font-weight: bold; margin: 2px; color: white; text-align: center; }
        .btn-map { background-color: #34a853; } /* Green */
        .btn-wa { background-color: #25d366; }  /* WhatsApp Green */
        
        #map-preview { display: none; margin-top: 20px; border: 3px solid #1a73e8; }
        iframe { width: 100%; height: 350px; border: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>📍 आंगनवाड़ी केंद्र सूची</h2>
    
    <table>
        <thead>
            <tr>
                <th>पंचायत</th>
                <th>केंद्र का नाम</th>
                <th>कार्रवाई</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>

    <!-- Embedded Map Section -->
    <div id="map-preview">
        <div style="padding: 10px; background: #eee; display: flex; justify-content: space-between;">
            <span id="loc-name">लोकेशन</span>
            <button onclick="document.getElementById('map-preview').style.display='none'">बंद करें</button>
        </div>
        <iframe id="mapFrame"></iframe>
    </div>
</div>

<script>
    const centers = [
        { panchayat: "रामपुर", name: "AWC 01", lat: 25.5941, lng: 85.1376 },
        { panchayat: "लक्ष्मणपुर", name: "AWC 05", lat: 25.6126, lng: 85.1583 }
    ];

    const listContainer = document.getElementById('list');

    centers.forEach(c => {
        // Direct Link to Google Maps to avoid "about:blank#blocked"
        const googleMapUrl = "https://google.com" + c.lat + "," + c.lng;
        const waUrl = "https://whatsapp.com" + encodeURIComponent("केंद्र: " + c.name + " लोकेशन: https://google.com" + c.lat + "," + c.lng);

        listContainer.innerHTML += `
            <tr>
                <td>${c.panchayat}</td>
                <td>${c.name}</td>
                <td>
                    <button class="btn btn-map" style="color:white; border:none; cursor:pointer;" onclick="openInPage(${c.lat}, ${c.lng}, '${c.name}')">यहाँ देखें</button>
                    
                    <a href="${googleMapUrl}" class="btn btn-map" style="background:#4285f4" target="_blank" rel="noopener noreferrer">रास्ता देखें</a>
                    
                    <a href="${waUrl}" class="btn btn-wa" target="_blank">WhatsApp</a>
                </td>
            </tr>
        `;
    });

    // Function to load map inside the page
    function openInPage(lat, lng, name) {
        const frame = document.getElementById('mapFrame');
        const box = document.getElementById('map-preview');
        // Correcting URL structure with explicit "/"
        frame.src = "https://google.com" + lat + "," + lng + "&output=embed";
        document.getElementById('loc-name').innerText = name;
        box.style.display = 'block';
    }
</script>

</body>
</html>
