<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आंगनवाड़ी केंद्र ट्रैकर</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #075e54; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: #075e54; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn { border: none; padding: 10px 14px; cursor: pointer; border-radius: 6px; font-size: 13px; color: white; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-nav { background: #34b7f1; } /* Blue for Directions */
        .btn-map { background: #128c7e; margin-right: 5px; } /* Green for Preview */
        #mapSection { display: none; margin-top: 20px; border: 2px solid #075e54; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 400px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 केंद्र विवरण और रास्ता</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>पंचायत</th>
                    <th>केंद्र का नाम</th>
                    <th>कार्रवाई</th>
                </tr>
            </thead>
            <tbody id="centerData"></tbody>
        </table>
    </div>

    <div id="mapSection">
        <div style="background:#075e54; color:white; padding:10px; display:flex; justify-content:space-between;">
            <span id="mapTitle">लोकेशन</span>
            <button onclick="document.getElementById('mapSection').style.display='none'" style="background:red; color:white; border:none; cursor:pointer;">बंद करें ×</button>
        </div>
        <iframe id="mapFrame" src=""></iframe>
    </div>
</div>

<script>
    const centers = [
        { panchayat: "रामपुर", name: "केंद्र 01", lat: 25.5941, lng: 85.1376 },
        { panchayat: "लक्ष्मणपुर", name: "केंद्र 05", lat: 25.6126, lng: 85.1583 }
    ];

    function render() {
        const tbody = document.getElementById('centerData');
        tbody.innerHTML = centers.map(c => {
            // FIX: Correct Google Maps URL structure
            const directionsUrl = "https://google.com" + c.lat + "," + c.lng + "&travelmode=driving";

            return `
                <tr>
                    <td>${c.panchayat}</td>
                    <td>${c.name}</td>
                    <td>
                        <button class="btn btn-map" onclick="viewMiniMap(${c.lat}, ${c.lng}, '${c.name}')">यहाँ देखें</button>
                        
                        <!-- FIX: Use window.location.href to avoid "about:blank#blocked" -->
                        <button class="btn btn-nav" onclick="window.location.href='${directionsUrl}'">रास्ता देखें</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function viewMiniMap(lat, lng, name) {
        const frame = document.getElementById('mapFrame');
        // FIX: Proper embed URL with slash
        frame.src = "https://google.com" + lat + "," + lng + "&hl=hi&z=15&output=embed";
        document.getElementById('mapTitle').innerText = name;
        document.getElementById('mapSection').style.display = 'block';
    }

    window.onload = render;
</script>
</body>
</html>
