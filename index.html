<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Center Navigator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:hover { background: #1557b0; }
        #status { margin-top: 20px; color: #555; font-size: 14px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Center Navigator</h2>
    <p style="font-size: 13px; color: #666;">Enter Code to start GPS route</p>
    <input type="text" id="centerCode" placeholder="Ex: C101, 502, etc.">
    <button onclick="findAndNavigate()">Get Directions</button>
    <div id="status"></div>
</div>

<script>
    async function findAndNavigate() {
        const codeInput = document.getElementById('centerCode').value.trim().toUpperCase();
        const status = document.getElementById('status');

        if (!codeInput) {
            alert("Please enter a code");
            return;
        }

        const sheetLink = "https://google.com";
        const proxyUrl = "https://corsproxy.io?" + encodeURIComponent(sheetLink);

        status.innerText = "🔍 Connecting to Sheet...";
        status.style.color = "blue";

        try {
            const response = await fetch(proxyUrl);
            const csvData = await response.text();
            const rows = csvData.split("\n");
            let lat = "";
            let lng = "";

            for (let i = 0; i < rows.length; i++) {
                const columns = rows[i].split(",").map(c => c.trim().replace(/^"|"$/g, ''));
                if (columns[0] && columns[0].toUpperCase() === codeInput) {
                    lat = columns[1];
                    lng = columns[2];
                    break;
                }
            }

            if (lat && lng) {
                status.innerText = "✅ Found! Starting Navigation...";
                status.style.color = "green";
                
                // FIXED: This opens the ROUTE from current location
                const mapUrl = "https://google.com" + lat + "," + lng + "&travelmode=driving";
                
                setTimeout(() => {
                    window.location.href = mapUrl;
                }, 800);
            } else {
                status.innerText = "❌ Code '" + codeInput + "' not found.";
                status.style.color = "red";
            }
        } catch (error) {
            status.innerText = "⚠️ Connection Failed.";
            status.style.color = "orange";
        }
    }
</script>


</body>
</html>
