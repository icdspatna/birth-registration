<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Navigator Fix</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; background: #eef2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; color: #666; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 केंद्र नेविगेटर</h2>
    <input type="text" id="centerCode" placeholder="Enter Center Code">
    <button onclick="findAndNavigate()">Get Directions</button>
    <div id="status"></div>
</div>

<script>
    // 1. अपनी Google Sheet का CSV लिंक यहाँ डालें (Must start with https://)
    var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3i5liXRYsyWCN2TFNcj8NUAN3lPHh0pO-bUdNQPuwmkvyLu339LkRrlcSephIGGWUnUwnWSJgwvjM/pub?output=csv";

    async function findAndNavigate() {
        var codeInput = document.getElementById('centerCode').value.trim().toUpperCase();
        var status = document.getElementById('status');
        
        if (codeInput === "") {
            alert("Please enter a code");
            return;
        }

        status.innerText = "Searching Sheet...";

        try {
            var response = await fetch(sheetURL);
            var text = await response.text();
            var rows = text.split("\n");

            var lat = "";
            var lng = "";

            for (var i = 0; i < rows.length; i++) {
                var cols = rows[i].split(",");
                // Column A = Code, B = Lat, C = Long
                if (cols[0] && cols[0].trim().toUpperCase() === codeInput) {
                    lat = cols[1].trim();
                    lng = cols[2].trim();
                    break;
                }
            }

            if (lat !== "" && lng !== "") {
                status.innerText = "Redirecting...";
                
                // 2. THIS IS THE CRITICAL FIX:
                // We use the most basic URL format possible to avoid DNS errors.
                var finalUrl = "https://google.com" + lat + "," + lng;
                
                // Use replace to prevent the "blocked" or "broken" browser history
                window.location.replace(finalUrl);
            } else {
                status.innerText = "❌ Code not found in sheet.";
            }
        } catch (error) {
            status.innerText = "⚠️ Connection Error. Check Internet/Link.";
        }
    }
</script>

</body>
</html>
