<!DOCTYPE html>
<html>
<head>
    <title>Fixed Map Locator</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { padding: 10px; margin: 5px; width: 150px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; max-width: 600px; height: 400px; border: 1px solid #ddd; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <h2>📍 Enter Coordinates</h2>
    <input type="text" id="lat" placeholder="Latitude (e.g. 25.5941)">
    <input type="text" id="lng" placeholder="Longitude (e.g. 85.1221)">
    <br><br>
    <button onclick="showMap()">Show Map</button>

    <br>
    <!-- This is where the map appears -->
    <iframe id="mapFrame"></iframe>

    <script>
        function showMap() {
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            const frame = document.getElementById('mapFrame');

            if (lat && lng) {
                // IMPORTANT: Use backticks `` (key above Tab) NOT single quotes ''
                // This allows ${lat} to be replaced by the actual number.
                const mapUrl = `https://google.com{lat},${lng}&output=embed`;
                
                frame.src = mapUrl;
                frame.style.display = "inline-block";
            } else {
                alert("Please enter both numbers!");
            }
        }
    </script>

</body>
</html>
