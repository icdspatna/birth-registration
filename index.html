<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWC Tracker - Final Version</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        
        /* Navigation Button Style */
        .nav-link { 
            display: inline-block; 
            background-color: #4285f4; 
            color: white; 
            padding: 10px 15px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
            font-size: 13px;
        }
        .nav-link:hover { background-color: #3367d6; }
        
        .wa-link { background-color: #25d366; }

        #map-display { display: none; margin-top: 20px; border: 2px solid #1a73e8; }
        iframe { width: 100%; height: 350px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 आंगनवाड़ी केंद्र सूची</h2>
    
    <table id="centerTable">
        <thead>
            <tr>
                <th>पंचायत</th>
                <th>केंद्र का नाम</th>
                <th>मार्ग (Maps)</th>
                <th>शेयर</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data injected here -->
        </tbody>
    </table>

    <div id="map-display">
        <div style="padding: 10px; background: #333; color: #fff; display: flex; justify-content: space-between;">
            <span id="targetName">नक्शा</span>
            <button onclick="document.getElementById('map-display').style.display='none'" style="color:white; background:red; border:none; cursor:pointer;">बंद करें</button>
        </div>
        <iframe id="iframeMap" src=""></iframe>
    </div>
</div>

<script>
    const centers = [
        { pan: "रामपुर", name: "AWC 01", lat: 25.5941, lng: 85.1376 },
        { pan: "लक्ष्मणपुर", name: "AWC 05", lat: 25.6126, lng: 85.1583 }
    ];

    const tbody = document.getElementById('tableBody');

    centers.forEach(c => {
        // PREPARING CLEAN URLS
        const mapUrl = "https://google.com" + c.lat + "," + c.lng;
        const waUrl = "https://whatsapp.com" + encodeURIComponent("आंगनवाड़ी केंद्र: " + c.name + "\nरास्ता: " + mapUrl);
        const embedUrl = "https://google.com" + c.lat + "," + c.lng + "&output=embed";

        const row = `
            <tr>
                <td>${c.pan}</td>
                <td>${c.name}</td>
                <td>
                    <a href="${mapUrl}" target="_blank" class="nav-link">रास्ता देखें</a>
                    <button onclick="showPreview('${embedUrl}', '${c.name}')" style="margin-top:5px; cursor:pointer; display:block; padding:5px; border:1px solid #ccc; background:#f9f9f9; width:100%; border-radius:4px;">यहीं देखें</button>
                </td>
                <td>
                    <a href="${waUrl}" target="_blank" class="nav-link wa-link">WhatsApp</a>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });

    function showPreview(url, name) {
        document.getElementById('iframeMap').src = url;
        document.getElementById('targetName').innerText = name;
        document.getElementById('map-display').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
