<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आंगनवाड़ी केंद्र ट्रैकर</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d35400; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #e67e22; color: white; }
        .btn { background: #27ae60; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; display: inline-block; cursor: pointer; font-size: 14px; border: none; }
        .btn:hover { background: #219150; }
        #map-area { margin-top: 20px; display: none; }
        iframe { width: 100%; height: 400px; border: 2px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 आंगनवाड़ी केंद्र सूची</h2>
    
    <input type="text" id="myInput" onkeyup="searchTable()" placeholder="पंचायत या केंद्र का नाम खोजें...">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>पंचायत</th>
                    <th>केंद्र / कोड</th>
                    <th>सेविका / सहायिका</th>
                    <th>मोबाइल</th>
                    <th>रास्ता देखें</th>
                </tr>
            </thead>
            <tbody id="centerData">
                <!-- Data is added here via JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- This section shows the map on the same page -->
    <div id="map-area">
        <h3 id="map-title">नक्शा</h3>
        <iframe id="mapFrame" src=""></iframe>
        <p><small>* ऊपर नेविगेशन के लिए "बड़ा नक्शा" बटन का उपयोग करें</small></p>
    </div>
</div>

<script>
    // केंद्र की जानकारी (Data List)
    const centers = [
        { panchayat: "रामपुर", name: "AWC 01", code: "101", sevika: "सुनीता देवी", sahayika: "रीता", mobile: "9876543210", lat: 25.5941, lng: 85.1376 },
        { panchayat: "लक्ष्मणपुर", name: "AWC 05", code: "105", sevika: "मीना सिंह", sahayika: "गीता", mobile: "9988776655", lat: 25.6126, lng: 85.1583 },
        { panchayat: "बिहटा", name: "AWC 12", code: "112", sevika: "अंजली कुमारी", sahayika: "पूनम", mobile: "8877665544", lat: 25.5615, lng: 84.8715 }
    ];

    const tableBody = document.getElementById('centerData');

    // टेबल बनाने का तरीका
    centers.forEach((item) => {
        let row = `<tr>
            <td>${item.panchayat}</td>
            <td><b>${item.name}</b><br><small>${item.code}</small></td>
            <td>${item.sevika}<br><small>${item.sahayika}</small></td>
            <td><a href="tel:${item.mobile}">${item.mobile}</a></td>
            <td>
                <button class="btn" onclick="viewPath(${item.lat}, ${item.lng}, '${item.name}')">यहाँ देखें</button>
                <button class="btn" style="background:#2980b9; margin-top:5px;" onclick="openGoogleMaps(${item.lat}, ${item.lng})">बड़ा नक्शा</button>
            </td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    // फंक्शन १: उसी पेज पर नक्शा दिखाना
    function viewPath(lat, lng, name) {
        const mapArea = document.getElementById('map-area');
        const mapFrame = document.getElementById('mapFrame');
        const mapTitle = document.getElementById('map-title');
        
        // Correct URL generation for Embed
        const embedUrl = "https://google.com" + lat + "," + lng + "&hl=hi&z=15&output=embed";
        
        mapTitle.innerText = "नक्शा: " + name;
        mapFrame.src = embedUrl;
        mapArea.style.display = "block";
        mapArea.scrollIntoView({behavior: "smooth"});
    }

    // फंक्शन २: गूगल मैप्स ऐप खोलना (Navigation)
    function openGoogleMaps(lat, lng) {
        // Correct URL generation for Directions
        const url = "https://google.com" + lat + "," + lng;
        window.open(url, '_blank');
    }

    // सर्च फंक्शन
    function searchTable() {
        let input = document.getElementById("myInput").value.toLowerCase();
        let rows = tableBody.getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            rows[i].style.display = rows[i].innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }
</script>

</body>
</html>
