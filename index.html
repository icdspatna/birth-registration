<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आंगनवाड़ी केंद्र - लाइव रास्ता</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #075e54; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: #075e54; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn { border: none; padding: 10px 14px; cursor: pointer; border-radius: 5px; font-size: 13px; text-decoration: none; color: white; display: inline-block; margin: 2px; font-weight: bold; }
        .btn-map { background: #128c7e; }
        .btn-wa { background: #25d366; }
        .btn-nav { background: #34b7f1; }
        #mapSection { display: none; margin-top: 20px; border: 2px solid #075e54; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 400px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 केंद्र विवरण और शेयरिंग</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="पंचायत या केंद्र का नाम खोजें..." onkeyup="filterTable()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>पंचायत</th>
                    <th>केंद्र</th>
                    <th>सेविका</th>
                    <th>मोबाइल</th>
                    <th>कार्रवाई</th>
                </tr>
            </thead>
            <tbody id="centerData"></tbody>
        </table>
    </div>

    <div id="mapSection">
        <div style="background:#075e54; color:white; padding:10px; display:flex; justify-content:space-between;">
            <span id="mapTitle">लोकेशन</span>
            <button onclick="document.getElementById('mapSection').style.display='none'" style="background:red; color:white; border:none; cursor:pointer; padding: 5px 10px;">बंद करें ×</button>
        </div>
        <iframe id="mapFrame" src=""></iframe>
    </div>
</div>

<script>
    const centers = [
        { panchayat: "रामपुर", name: "AWC 01", sevika: "सुनीता देवी", mobile: "9876543210", lat: 25.5941, lng: 85.1376 },
        { panchayat: "लक्ष्मणपुर", name: "AWC 05", sevika: "मीना सिंह", mobile: "9988776655", lat: 25.6126, lng: 85.1583 }
    ];

    function render() {
        const tbody = document.getElementById('centerData');
        tbody.innerHTML = centers.map(c => `
            <tr>
                <td>${c.panchayat}</td>
                <td>${c.name}</td>
                <td>${c.sevika}</td>
                <td><a href="tel:${c.mobile}">${c.mobile}</a></td>
                <td>
                    <button class="btn btn-map" onclick="viewMap(${c.lat}, ${c.lng}, '${c.name}')">यहीं देखें</button>
                    
                    <!-- Fixed Navigation Button: Removed <a> tag to avoid blocking -->
                    <button class="btn btn-nav" onclick="launchNavigation(${c.lat}, ${c.lng})">रास्ता देखें</button>
                    
                    <button class="btn btn-wa" onclick="shareWA('${c.name}', ${c.lat}, ${c.lng})">शेयर</button>
                </td>
            </tr>
        `).join('');
    }

    // १. नेविगेशन लॉन्च करने का पक्का तरीका (No "about:blank#blocked")
    function launchNavigation(lat, lng) {
        // यह URL सीधे गूगल मैप्स ऐप को ट्रिगर करता है
        const navUrl = "https://google.com" + lat + "," + lng + "&travelmode=driving";
        
        // _self का उपयोग करने से ब्राउज़र इसे ब्लॉक नहीं करता
        window.location.href = navUrl;
    }

    // २. मिनी मैप लोड करना
    function viewMap(lat, lng, name) {
        const frame = document.getElementById('mapFrame');
        const embedUrl = "https://google.com" + lat + "," + lng + "&hl=hi&z=15&output=embed";
        frame.src = embedUrl;
        document.getElementById('mapTitle').innerText = name;
        document.getElementById('mapSection').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // ३. व्हाट्सएप शेयर
    function shareWA(name, lat, lng) {
        const mapUrl = "https://google.com" + lat + "," + lng;
        const text = encodeURIComponent("केंद्र: " + name + "\nरास्ता यहाँ देखें: " + mapUrl);
        window.location.href = "https://whatsapp.com" + text;
    }

    function filterTable() {
        const val = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#centerData tr");
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none");
    }

    window.onload = render;
</script>

</body>
</html>
