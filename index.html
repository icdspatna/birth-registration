<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Navigator - Fixed</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #status { margin-top: 20px; color: #666; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 GPS Navigator</h2>
    <input type="text" id="centerCode" placeholder="Enter Center Code (e.g. C101)">
    <button onclick="findAndNavigate()">Get Directions</button>
    <div id="status"></div>
</div>

<script>
    async function findAndNavigate() {
        const codeInput = document.getElementById('centerCode').value.trim().toUpperCase();
        const status = document.getElementById('status');

        if (!codeInput) {
            alert("Please enter a code");
            return;
        }

        // 1. YOUR REAL SHEET LINK (Encoded)
        const sheetLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3i5liXRYsyWCN2TFNcj8NUAN3lPHh0pO-bUdNQPuwmkvyLu339LkRrlcSephIGGWUnUwnWSJgwvjM/pub?gid=0&single=true&output=csv";

        // 2. THE PROXY URL (Strictly formatted to prevent DNS errors)
        const proxyUrl = "https://allorigins.win" + encodeURIComponent(sheetLink);

        status.innerText = "🔍 Checking Sheet...";
        status.style.color = "blue";

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Failed to connect to spreadsheet.");

            const textData = await response.text();
            const rows = textData.split("\n");

            let lat = "";
            let lng = "";

            for (let i = 0; i < rows.length; i++) {
                const cols = rows[i].split(",");
                // Column A: Code | Column B: Lat | Column C: Long
                if (cols && cols[0].trim().toUpperCase() === codeInput) {
                    lat = cols[1].trim();
                    lng = cols[2].trim();
                    break;
                }
            }

            if (lat && lng) {
                status.innerText = "✅ Found! Opening Google Maps...";
                status.style.color = "green";
                
                // Final Navigation URL from current location
                const finalUrl = "https://google.com" + lat + "," + lng;
                window.location.href = finalUrl;
            } else {
                status.innerText = "❌ Code '" + codeInput + "' not found in sheet.";
                status.style.color = "red";
            }
        } catch (error) {
            status.innerText = "⚠️ Connection Error: " + error.message;
            status.style.color = "orange";
        }
    }
</script>

</body>
</html>
