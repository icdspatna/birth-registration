<!DOCTYPE html>
<html>
<head>
  <title>Birth Certificate Registration</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
    form { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;}
    button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #218838; }
    h2 { text-align: center; color: #333; }
  </style>
</head>
<body>

  <form name="submit-to-google-sheet">
    <h2>Birth Registration</h2>
    
    <label>Child's Full Name</label>
    <input type="text" name="ChildName" placeholder="Ex: Arjun Kumar" required>

    <label>Date of Birth</label>
    <input type="date" name="DOB" required>

    <label>Gender</label>
    <select name="Gender" required>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>

    <label>Father's Name</label>
    <input type="text" name="FatherName" placeholder="Father's Full Name" required>

    <label>Mother's Name</label>
    <input type="text" name="MotherName" placeholder="Mother's Full Name" required>

    <label>Place of Birth</label>
    <input type="text" name="PlaceOfBirth" placeholder="City/Hospital Name" required>

    <button type="submit">Register Birth</button>
  </form>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx3t2D_kK5i2fuO9aGaHiDVAPdyN7Z_AnB_Qmhw1NHGsVDDKu1i3pXNROrDRiVXiHTr/exec
'; // <--- PASTE YOUR URL HERE
    const form = document.forms['submit-to-google-sheet'];

    form.addEventListener('submit', e => {
      e.preventDefault();
      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => alert("Thank You! Registration Data Submitted Successfully."))
        .then(() => { window.location.reload(); })
        .catch(error => console.error('Error!', error.message));
    });
  </script>

</body>
</html>
