<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आंगनवाड़ी केंद्र विवरण</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .card { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; min-width: 600px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #3498db; color: #fff; }
        .action-btn { background: #27ae60; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; margin: 2px; }
        .action-btn:hover { background: #219150; }
        #mapSection { margin-top: 20px; display: none; border: 2px solid #3498db; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 450px; border: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 आंगनवाड़ी केंद्र मार्गदर्शिका</h2>
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="पंचायत या केंद्र खोजें...">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>पंचायत</th>
                    <th>केंद्र/कोड</th>
                    <th>सेविका</th>
                    <th>मोबाइल</th>
                    <th>रास्ता</th>
                </tr>
            </thead>
            <tbody id="centerTable">
                <!-- डेटा यहाँ लोड होगा -->
            </tbody>
        </table>
    </div>

    <!-- मैप दिखाने की जगह -->
    <div id="mapSection">
        <div style="background:#3498db; color:white; padding:10px; display:flex; justify-content:space-between;">
            <span id="mapTitle">लोकेशन</span>
            <button onclick="document.getElementById('mapSection').style.display='none'" style="background:red; color:white; border:none; cursor:pointer;">बंद करें</button>
        </div>
        <iframe id="mainMap" src=""></iframe>
    </div>
</div>

<script>
    const centers = [
        { pan: "रामपुर", name: "AWC 01", code: "101", sevika: "सुनीता देवी", mob: "9876543210", lat: 25.5941, lng: 85.1376 },
        { pan: "लक्ष्मणपुर", name: "AWC 05", code: "105", sevika: "मीना सिंह", mob: "9988776655", lat: 25.6126, lng: 85.1583 },
        { pan: "बिहटा", name: "AWC 12", code: "112", sevika: "अंजली कुमारी", mob: "8877665544", lat: 25.5615, lng: 84.8715 }
    ];

    function loadData() {
        const tbody = document.getElementById('centerTable');
        tbody.innerHTML = centers.map(c => `
            <tr>
                <td>${c.pan}</td>
                <td>${c.name}<br><small>${c.code}</small></td>
                <td>${c.sevika}</td>
                <td><a href="tel:${c.mob}">${c.mob}</a></td>
                <td>
                    <button class="action-btn" onclick="showMap(${c.lat}, ${c.lng}, '${c.name}')">यहाँ देखें</button>
                    <button class="action-btn" style="background:#2980b9" onclick="openNav(${c.lat}, ${c.lng})">गूगल मैप</button>
                </td>
            </tr>
        `).join('');
    }

    // १. इसी पेज में मैप लोड करने का सही तरीका (Embed Map)
    function showMap(lat, lng, name) {
        document.getElementById('mapSection').style.display = 'block';
        document.getElementById('mapTitle').innerText = "स्थान: " + name;
        // ध्यान दें: "google.com/maps" के बीच "/" होना अनिवार्य है
        const embedUrl = "https://google.com" + lat + "," + lng + "&hl=hi&z=14&output=embed";
        document.getElementById('mainMap').src = embedUrl;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // २. नेविगेशन के लिए गूगल मैप ऐप खोलने का सही तरीका (Directions)
    function openNav(lat, lng) {
        const navUrl = "https://google.com" + lat + "," + lng;
        window.open(navUrl, '_blank');
    }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#centerTable tr");
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none");
    }

    window.onload = loadData;
</script>

</body>
</html>
