<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Center Navigator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Center Navigator</h2>
    <input type="text" id="centerCode" placeholder="Enter Center Code (Ex: C101)">
    <button onclick="findAndNavigate()">Get Directions</button>
    <div id="status"></div>
</div>

<script>
    async function findAndNavigate() {
        const codeInput = document.getElementById('centerCode').value.trim().toUpperCase();
        const status = document.getElementById('status');

        if (!codeInput) {
            alert("Please enter a code");
            return;
        }

        // PASTE YOUR GOOGLE WEB APP URL BELOW
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxhPYSweWtqeK8cYE5co8yUDVixPtIhDUdoQrW4djgUpU-ztyrcZDxRV9S9FyK8p4TT/exec";

        status.innerText = "🔍 Connecting to private proxy...";
        status.style.color = "blue";

        try {
            const response = await fetch(webAppUrl);
            if (!response.ok) throw new Error("Proxy error");

            const csvData = await response.text();
            const rows = csvData.split("\n");
            let lat = "", lng = "";

            for (let i = 0; i < rows.length; i++) {
                const columns = rows[i].split(",").map(c => c.trim().replace(/^"|"$/g, ''));
                if (columns[0] && columns[0].toUpperCase() === codeInput) {
                    lat = columns[1];
                    lng = columns[2];
                    break;
                }
            }

            if (lat && lng) {
                status.innerText = "✅ Found! Starting Navigation...";
                status.style.color = "green";
                const mapUrl = `https://google.com{lat},${lng}`;
                window.location.href = mapUrl;
            } else {
                status.innerText = `❌ Code '${codeInput}' not found.`;
                status.style.color = "red";
            }
        } catch (error) {
            status.innerText = "⚠️ Connection Error. Ensure Web App is 'Anyone'.";
            status.style.color = "orange";
        }
    }
</script>


</body>
</html>
