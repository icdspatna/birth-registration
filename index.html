<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final GPS Fix</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; background: #eef2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; color: #666; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 केंद्र नेविगेटर (Fixed)</h2>
    <input type="text" id="centerCode" placeholder="Enter Center Code (e.g. 101)">
    <button onclick="findAndNavigate()">Get Directions</button>
    <div id="status"></div>
</div>

<script>
    async function findAndNavigate() {
        // Your specific Google Sheet link
        var originalLink = "https://google.com";

        // FIXED: Added the proper /raw?url= separator
        var proxyUrl = "https://allorigins.win" + encodeURIComponent(originalLink);

        var codeInput = document.getElementById('centerCode').value.trim().toUpperCase();
        var status = document.getElementById('status');
        
        if (codeInput === "") {
            alert("Please enter a center code");
            return;
        }

        status.innerText = "Searching for Center " + codeInput + "...";
        status.style.color = "blue";

        try {
            var response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Could not connect to Sheet");
            
            var text = await response.text();
            var rows = text.split("\n");
            
            var lat = "";
            var lng = "";

            for (var i = 0; i < rows.length; i++) {
                var cols = rows[i].split(",");
                // Column A (0) = Code, Column B (1) = Lat, Column C (2) = Long
                if (cols[0] && cols[0].trim().toUpperCase() === codeInput) {
                    lat = cols[1].trim();
                    lng = cols[2].trim();
                    break;
                }
            }

            if (lat !== "" && lng !== "") {
                status.innerText = "Center Found! Opening Map...";
                status.style.color = "green";
                
                // Final URL for Google Maps Navigation
                var mapUrl = "https://google.com" + lat + "," + lng;
                window.location.href = mapUrl;
            } else {
                status.innerText = "❌ Center Code '" + codeInput + "' not found in Sheet.";
                status.style.color = "red";
            }
        } catch (error) {
            status.innerText = "⚠️ Connection Error: " + error.message;
            status.style.color = "orange";
        }
    }
</script>


</body>
</html>
