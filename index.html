<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Center Navigator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Center Navigator</h2>
    <input type="text" id="centerCode" placeholder="Enter Center Code (Ex: C101)">
    <button onclick="findAndNavigate()">Get Directions</button>
    <div id="status"></div>
</div>

<script>
    async function findAndNavigate() {
        const codeInput = document.getElementById('centerCode').value.trim().toUpperCase();
        const status = document.getElementById('status');

        if (!codeInput) {
            alert("Please enter a code");
            return;
        }

        // Your Google Sheet Link
        const sheetLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK3UMn0hlZmpM-CymOvERayPN9rh3xIoTC5J9yO7RyTna76hQofcBeQJlKAXYHS2Fov_YzsoBX8ltU/pub?output=csv";
        const encodedLink = encodeURIComponent(sheetLink);

        // List of Proxies to try (Backup system)
        const proxies = [
            `https://allorigins.win{encodedLink}`,     // Option 1: AllOrigins (Raw)
            `https://corsproxy.io{encodedLink}`,              // Option 2: CorsProxy
            `https://freeboard.io{sheetLink}`     // Option 3: ThingProxy
        ];

        status.innerText = "🔍 Connecting...";
        status.style.color = "blue";

        let csvData = null;
        let activeProxy = "";

        // Try proxies one by one until one works
        for (const proxy of proxies) {
            try {
                console.log("Trying proxy:", proxy);
                const response = await fetch(proxy);
                
                if (response.ok) {
                    csvData = await response.text();
                    activeProxy = proxy;
                    break; // Stop loop if we found data
                }
            } catch (e) {
                console.warn("Proxy failed, trying next...", e);
            }
        }

        if (!csvData) {
            status.innerText = "⚠️ Network busy. Please click again.";
            status.style.color = "orange";
            return;
        }

        // Process the data
        const rows = csvData.split("\n");
        let lat = "";
        let lng = "";

        for (let i = 0; i < rows.length; i++) {
            // Clean columns (remove quotes, spaces)
            const columns = rows[i].split(",").map(c => c.trim().replace(/^"|"$/g, ''));
            
            if (columns[0] && columns[0].toUpperCase() === codeInput) {
                lat = columns[1];
                lng = columns[2];
                break;
            }
        }

        if (lat && lng) {
            status.innerText = "✅ Found! Opening Maps...";
            status.style.color = "green";
            
            // FINAL CORRECT MAP LINK
            const mapUrl = `https://google.com{lat},${lng}&travelmode=driving`;
            
            setTimeout(() => {
                window.location.href = mapUrl;
            }, 800);
        } else {
            status.innerText = `❌ Code '${codeInput}' not found.`;
            status.style.color = "red";
        }
    }
</script>


</body>
</html>
