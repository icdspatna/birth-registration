<!DOCTYPE html>
<html>
<head>
    <title>GPS Route Connector</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .nav-btn { background: #1a73e8; color: white; padding: 14px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .nav-btn:hover { background: #1765cc; }
        p { color: #5f6368; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Navigate to Spot</h2>
        <input type="number" id="destLat" placeholder="Destination Latitude" step="any">
        <input type="number" id="destLng" placeholder="Destination Longitude" step="any">
        <button class="btn" onclick="startNavigation()">GET DIRECTIONS</button>
        <p>Uses your current GPS as the start point.</p>
    </div>

    <script>
        function startNavigation() {
            const lat = document.getElementById('destLat').value.trim();
            const lng = document.getElementById('destLng').value.trim();

            if (lat && lng) {
                // By not providing an 'origin', Google Maps uses your current GPS
                // 'dir_action=navigate' launches turn-by-turn mode if possible
                const routeUrl = "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng + "&travelmode=driving&dir_action=navigate";
                
                // Open in same tab to avoid 'about:blank#blocked' [Turn 6]
                window.location.href = routeUrl;
            } else {
                alert("Please enter the destination coordinates first.");
            }
        }
    </script>

</body>
</html>
