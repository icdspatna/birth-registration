<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Map Viewer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .inputs { margin-bottom: 20px; }
        input { padding: 10px; margin: 5px; width: 150px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        iframe { width: 100%; max-width: 600px; height: 450px; border: 0; display: none; margin-top: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="inputs">
        <input type="number" id="lat" placeholder="Latitude">
        <input type="number" id="lng" placeholder="Longitude">
        <button onclick="showMap()">Show Map Here</button>
    </div>

    <!-- This is the window that will show the map -->
    <iframe id="mapFrame" allowfullscreen></iframe>

    <script>
        function showMap() {
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            const frame = document.getElementById('mapFrame');

            if (lat && lng) {
                // Uses Google's Embed API structure
                // Note: Sometimes Google limits embeds without an API key, 
                // but this format often works for testing.
                frame.src = `https://google.com{lat},${lng}&hl=es;z=14&output=embed`;
                frame.style.display = "inline-block";
            } else {
                alert("Enter coordinates!");
            }
        }
    </script>

</body>
</html>
